name: Build Pull request
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    name: Node ${{ matrix.node }} sample
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build
        env:
          # Compile check only. Local mode uses the filesystem datalayer, so the build
          # needs no MongoDB/Redis. The deployed image is built separately
          # (docker-image.yml -> Dockerfile) with TINA_PUBLIC_IS_LOCAL=false.
          TINA_PUBLIC_IS_LOCAL: "true"
          GITHUB_BRANCH: ${{ github.head_ref }}
